services:
  database:
    image: postgres
    container_name: fluxy_db
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_DB: ${DATABASE_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fluxy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    container_name: fluxy_backend
    build:
      context: ./back-end/iefc-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./back-end/iefc-backend:/app
    environment:
      DATABASE_URL: jdbc:postgresql://database:5432/${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      APP_PORT: 8080
    depends_on:
      database:
        condition: service_healthy
    networks:
      - fluxy-network

  frontend:
    container_name: fluxy_frontend
    build:
      context: ./fluxy-frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./fluxy-frontend:/app
      - /app/node_modules
    environment:
      VITE_APP_PORT: 5173
      VITE_API_URL: http://localhost:8080/api/v1
    depends_on:
      - backend
    networks:
      - fluxy-network

volumes:
  postgres_data:
    driver: local

networks:
  fluxy-network:
    driver: bridge
