services:
  database:
    image: postgres
    container_name: fluxy_container
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_DB: ${DATABASE_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fluxy-network
  api:
    container_name: fluxy_backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - ${APP_PORT}:${APP_PORT}
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - database
    networks:
      - fluxy-network
volumes:
  postgres_data:
    driver: local

networks:
  fluxy-network:
    driver: bridge