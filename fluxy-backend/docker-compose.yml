services:
  postgres:
    image: postgres
    container_name: fluxy_container
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_DB: ${DATABASE_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fluxy-network

volumes:
  postgres_data:
    driver: local

networks:
  fluxy-network:
    driver: bridge