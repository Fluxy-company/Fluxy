<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Fluxy - Lista de Usuários</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main-section">
        <h1>Lista de Usuários</h1>
    
        <button onclick="buscarTodos()">Listar Usuários</button>
        <br><br>
        <li id="lista" class="listaUsuarios"></li>
    
         <a class="link" href="login.html">Voltar para login</a>

    </div>

</body>
</html>

<script>
    async function buscarTodos() {

        const resposta = await fetch("http://localhost:8080/api/v1/usuarios");

        console.log("Resposta da API")
        console.log("Endpoint:", resposta.url);
        console.log("Método: GET", );
        console.log("Status:" , resposta.status);
        console.log(resposta.statusText);

        if(!resposta.ok){
        console.log("Erro ao buscar usuários");
        return;
    }

        const usuarios = await resposta.json();

        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        usuarios.forEach(usuario => {
            if(usuario.nome == "admin"){
                return null;
            }
            lista.innerHTML += `
            <li>${usuario.nome} ${usuario.sobrenome} - ${usuario.email}</li>
        `;
        });

    }

</script>
