<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxy - Cadastro</title>
    <script src="utils.js"></script>
</head>
<body>
    
<h1>Cadastro</h1>

<input type="text" id="nome" placeholder="Nome">
<br><br>

<input type="text" id="sobrenome" placeholder="Sobrenome">
<br><br>

<input type="text" id="email" placeholder="Email">
<br><br>

<input type="password" id="senha"  placeholder="Senha">
<br><br>

<button onclick="cadastrar()">Cadastrar</button>

<p id="mensagem"></p>

<a href="login.html">Login</a> 
</body>
</html>


<script>

async function cadastrar(){

    const nome = document.getElementById("nome").value;
    const sobrenome = document.getElementById("sobrenome").value;
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const usuario = {
        nome: nome,
        sobrenome: sobrenome,
        email: email,
        senha: senha
    }

    const mensagem = document.getElementById("mensagem");

     if(!verificarEmail(usuario.email)){
        mensagem.innerHTML = "Email inválido";
        return;
    }

    if(!senhaValida(usuario.senha)){
        mensagem.innerHTML = "Senha deve ter no mínimo 6 caracteres.";
        return;
    }

    const resposta = await fetch("http://localhost:8080/api/v1/usuarios",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify(usuario)
    });

    

    if(resposta.ok){
        mensagem.innerHTML = "Usuário cadastrado!";
    }else{
        mensagem.innerHTML = "Erro ao cadastrar";
    }

}

</script>
