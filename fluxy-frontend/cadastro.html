<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Fluxy - Cadastro</title>
    <script src="utils.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-section">
        
        <h1>Cadastro</h1>
        <label for="nome">Insira seu nome</label>
        <br>
        <input type="text" id="nome" placeholder="Nome">
        <br><br>
        
        <label for="sobrenome">Insira seu sobrenome</label>
        <br>
        <input type="text" id="sobrenome" placeholder="Sobrenome">
        <br><br>
        
        <label for="sobrenome">Insira seu email</label>
        <br>
        <input type="text" id="email" placeholder="Email">
        <br><br>
        
        <label for="senha">Insira sua senha</label>
        <br>
        <input type="password" id="senha"  placeholder="Senha">
        <br><br>
        
        <button onclick="cadastrar()">Cadastrar</button>
        
        <p id="mensagem"></p>
        
        <nav><label for="login-section">Já tem cadastro?</label>
            <a href="login.html" id="login-section">Login</a> 
        </nav>
    </div>

</body>
</html>


<script>

async function cadastrar(){

    const nome = document.getElementById("nome").value;
    const sobrenome = document.getElementById("sobrenome").value;
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const usuario = {
        nome: nome,
        sobrenome: sobrenome,
        email: email,
        senha: senha
    }

    const mensagem = document.getElementById("mensagem");

     if(!verificarEmail(usuario.email)){
        mensagem.innerHTML = "Email inválido";
        return;
    }

    if(!senhaValida(usuario.senha)){
        mensagem.innerHTML = "Senha deve ter no mínimo 6 caracteres.";
        return;
    }

    const resposta = await fetch("http://localhost:8080/api/v1/usuarios",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify(usuario)
    });

        console.log("Resposta da API")
        console.log("Endpoint:", resposta.url);
        console.log("Método: POST", );
        console.log("Status:" , resposta.status);
        console.log(resposta.statusText);

    if(resposta.ok){
        mensagem.innerHTML = "Usuário cadastrado!";
    }else{
        console.log("Erro no cadastro:", resposta.statusText);
        mensagem.innerHTML = "Erro ao cadastrar";
    }

}

</script>
