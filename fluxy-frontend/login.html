<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Fluxy - Login</title>
    <script src="utils.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-section">

        <h1>Login</h1>
        
        <input type="text" id="email" placeholder="Email">
        <br><br>
        
        <input id="senha" type="password" placeholder="Senha">
        <br><br>
        
        <button onclick="login()">Entrar</button>
        
        <p id="mensagem" class="mensagem"></p>
        
        <nav><label for="cadastro-section">Ainda não tem cadastro?</label>
            <a class="link" href="cadastro.html" id="cadastro-section">Cadastre-se</a>
        </nav>
        
    </div>

</body>
</html>

<script>

async function login(){

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const usuario = {
        email: email,
        senha: senha
    }

     const mensagem = document.getElementById("mensagem");

    const resposta = await fetch("http://localhost:8080/api/v1/login",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify(usuario)
    });

        console.log("Resposta da API")
        console.log("Endpoint:", resposta.url);
        console.log("Método: POST", );
        console.log("Status:" , resposta.status);
        console.log(resposta.statusText);

      if(!verificarEmail(usuario.email)){
        mensagem.innerHTML = "Email inválido";
        return;
    }

    if(resposta.ok){

        const data = await resposta.json();

        localStorage.setItem("token", data.token);

        mensagem.innerHTML = "Login realizado com sucesso!";

        setTimeout(()=>{
            window.location = "listagemUsuarios.html"
        }, 1000)

    }else{
         console.log("Erro no login:", resposta.statusText);
        mensagem.innerHTML = "Email ou senha inválidos";
    }

}

</script>
